# IPTV Playlist Merger Configuration
# Configure behavior of merge.py script

# Target IP address to filter channels
target_ip: '103.73.185.62'

# Source file containing playlist URLs
sources_file: 'sources.txt'

# Output merged playlist file
output_file: 'merged.m3u'

# Network timeout in seconds for downloading playlists
timeout: 10

# Filter options
filters:
  # Filter by country code (optional)
  country_codes: []  # Example: ['IN', 'BD']
  
  # Filter by group/category (optional)
  categories: []  # Example: ['Movies', 'News', 'Sports']
  
  # Include only working channels (requires testing)
  test_channels: false

# Logging
logging:
  enabled: true
  level: 'INFO'  # DEBUG, INFO, WARNING, ERROR

# Advanced options
advanced:
  # Merge duplicate channels based on URL
  remove_duplicates: true
  
  # Sort channels by group
  sort_by_group: false
  
  # Include channel metadata
  include_metadata: true
