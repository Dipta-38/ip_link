name: IPTV Auto Merge (HTTP Proxy)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install packages
      run: pip install requests
    
    - name: Test HTTP proxy
      run: |
        echo "🔍 Testing HTTP proxy 103.125.31.222:80"
        
        # Test HTTP through proxy
        IP=$(curl -s --max-time 5 --proxy http://103.125.31.222:80 http://api.ipify.org || echo "failed")
        
        if [ "$IP" != "failed" ] && [ ! -z "$IP" ]; then
          echo "✅ HTTP proxy working! IP: $IP"
          
          # Check location
          COUNTRY=$(curl -s http://ip-api.com/json/$IP | jq -r .country)
          echo "📍 Country: $COUNTRY"
          
          if [ "$COUNTRY" = "Bangladesh" ]; then
            echo "✅ Confirmed Bangladeshi IP!"
            echo "PROXY_HTTP=http://103.125.31.222:80" >> $GITHUB_ENV
          fi
        else
          echo "❌ HTTP proxy not working"
        fi
    
    - name: Run merge script
      env:
        HTTP_PROXY: ${{ env.PROXY_HTTP }}
      run: |
        if [ ! -z "$HTTP_PROXY" ]; then
          echo "🚀 Using HTTP proxy: $HTTP_PROXY"
        fi
        python merge.py
    
    - name: Commit playlist
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions@github.com"
        git add merged.m3u
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto update IPTV playlist [HTTP Proxy]"
        git push
