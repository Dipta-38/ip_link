name: Auto Merge IPTV Playlists

on:
  # Run every 24 hours at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run merge script
        run: python merge.py
      
      - name: Check if merged.m3u changed
        id: check_changes
        run: |
          if git diff --quiet merged.m3u; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Configure git
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git add merged.m3u
          git commit -m "chore: auto-merge IPTV playlists [$(date +'%Y-%m-%d %H:%M:%S UTC')]"
          git push
      
      - name: No changes to commit
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "No changes detected in merged.m3u"
