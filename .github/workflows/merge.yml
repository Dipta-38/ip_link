name: IPTV Auto Merge (BD Proxy 103.239.253.66:8080)

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install packages
      run: pip install requests
    
    - name: Verify Bangladeshi Proxy
      env:
        HTTP_PROXY: "http://103.239.253.66:8080"
        HTTPS_PROXY: "http://103.239.253.66:8080"
      run: |
        echo "🔍 Testing proxy: 103.239.253.66:8080"
        IP=$(curl -s --max-time 10 --proxy http://103.239.253.66:8080 https://api.ipify.org)
        
        if [ ! -z "$IP" ]; then
          echo "✅ Proxy working! IP: $IP"
          
          # Check location
          COUNTRY=$(curl -s http://ip-api.com/json/$IP | jq -r .country)
          CITY=$(curl -s http://ip-api.com/json/$IP | jq -r .city)
          
          echo "📍 Location: $CITY, $COUNTRY"
          
          if [ "$COUNTRY" = "Bangladesh" ]; then
            echo "✅ Confirmed Bangladeshi IP!"
            echo "PROXY_WORKING=true" >> $GITHUB_ENV
          else
            echo "⚠️ Warning: IP is from $COUNTRY, not Bangladesh"
            echo "PROXY_WORKING=true" >> $GITHUB_ENV
          fi
        else
          echo "❌ Proxy failed"
          echo "PROXY_WORKING=false" >> $GITHUB_ENV
        fi
    
    - name: Run merge script with proxy
      env:
        HTTP_PROXY: "http://103.239.253.66:8080"
        HTTPS_PROXY: "http://103.239.253.66:8080"
        NO_PROXY: "localhost,127.0.0.1"
      run: python merge.py
    
    - name: Commit and push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions@github.com"
        git add merged.m3u
        
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto update IPTV playlist [BD Proxy 103.239.253.66:8080]"
          git push
        fi
