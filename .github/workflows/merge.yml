name: IPTV Auto Merge

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install packages
      run: pip install requests
    
    - name: Test HTTP Proxy
      run: |
        echo "🔍 Testing proxy 103.125.31.222:80"
        
        # Test HTTP through proxy
        IP=$(curl -s --max-time 5 --proxy http://103.125.31.222:80 http://api.ipify.org || echo "")
        
        if [ ! -z "$IP" ]; then
          echo "✅ Proxy working! IP: $IP"
          echo "PROXY_HTTP=http://103.125.31.222:80" >> $GITHUB_ENV
        else
          echo "❌ Proxy not working, will run without proxy"
        fi
    
    - name: Run merge script
      env:
        HTTP_PROXY: ${{ env.PROXY_HTTP }}
      run: |
        if [ ! -z "$HTTP_PROXY" ]; then
          echo "🚀 Using proxy: $HTTP_PROXY"
        else
          echo "⚠️ Running without proxy"
        fi
        python merge.py
    
    - name: Commit and push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions@github.com"
        git add merged.m3u
        
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto update IPTV playlist [$(date +'%Y-%m-%d %H:%M')]"
          git push
        fi
