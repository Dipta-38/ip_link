name: IPTV Auto Merge (BD Proxy Port 80)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Add these permissions
permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}  # Use token for checkout
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install packages
      run: pip install requests
    
    - name: Run merge script with BD proxy
      env:
        HTTP_PROXY: "http://103.125.31.222:80"
        HTTPS_PROXY: "http://103.125.31.222:80"
      run: python merge.py
    
    - name: Commit playlist
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Use token for push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions@github.com"
        git add merged.m3u
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto update IPTV playlist [BD Proxy Port 80]"
        git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
