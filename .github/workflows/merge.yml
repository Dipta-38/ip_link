name: Merge IPTV with Bangladesh IP Filter

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  merge:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pysocks urllib3

      # Configure Bangladesh proxy/VPN access
      - name: Setup Bangladesh IP Access
        env:
          BD_PROXY_HTTP: ${{ secrets.BD_PROXY_HTTP }}
          BD_PROXY_HTTPS: ${{ secrets.BD_PROXY_HTTPS }}
          OPENVPN_CONFIG: ${{ secrets.OPENVPN_CONFIG }}
          WIREGUARD_CONFIG: ${{ secrets.WIREGUARD_CONFIG }}
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "🔧 Configuring Bangladesh IP Access"
          echo "═══════════════════════════════════════════════════════════"
          
          # Check which proxy/VPN option is configured
          if [ -n "$BD_PROXY_HTTP" ]; then
            echo "✅ Using HTTP Proxy from secrets"
            echo "BD_PROXY_HTTP=$BD_PROXY_HTTP" >> $GITHUB_ENV
            echo "BD_PROXY_HTTPS=$BD_PROXY_HTTPS" >> $GITHUB_ENV
            echo "USE_BD_PROXY=true" >> $GITHUB_ENV
          
          elif [ -n "$OPENVPN_CONFIG" ]; then
            echo "🔐 Setting up OpenVPN connection..."
            sudo apt-get update -qq > /dev/null 2>&1
            sudo apt-get install -y openvpn > /dev/null 2>&1
            
            # Decode and write OpenVPN config
            echo "$OPENVPN_CONFIG" | base64 -d > /tmp/bd-vpn.ovpn
            
            # Start OpenVPN
            sudo openvpn --config /tmp/bd-vpn.ovpn --log /tmp/openvpn.log --daemon
            echo "⏳ Waiting for VPN connection..."
            sleep 15
            
            # Check if VPN connected
            if sudo ip route | grep -q "tun0\|tap0"; then
              echo "✅ OpenVPN connected successfully"
              echo "USE_BD_PROXY=false" >> $GITHUB_ENV
            else
              echo "⚠️  OpenVPN might not be fully connected, but continuing..."
              echo "USE_BD_PROXY=false" >> $GITHUB_ENV
            fi
          
          elif [ -n "$WIREGUARD_CONFIG" ]; then
            echo "🔐 Setting up WireGuard connection..."
            sudo apt-get update -qq > /dev/null 2>&1
            sudo apt-get install -y wireguard > /dev/null 2>&1
            
            # Decode and write WireGuard config
            echo "$WIREGUARD_CONFIG" | base64 -d | sudo tee /etc/wireguard/wg0.conf > /dev/null
            
            # Start WireGuard
            sudo wg-quick up wg0 || true
            echo "⏳ Waiting for WireGuard connection..."
            sleep 5
            
            if sudo ip link show wg0 > /dev/null 2>&1; then
              echo "✅ WireGuard connected successfully"
            else
              echo "⚠️  WireGuard setup attempted but may not be fully connected"
            fi
            echo "USE_BD_PROXY=false" >> $GITHUB_ENV
          
          else
            echo "⚠️  No proxy/VPN configured - using default connection"
            echo "   To use Bangladesh IP, add secrets:"
            echo "   - BD_PROXY_HTTP and BD_PROXY_HTTPS for HTTP proxy"
            echo "   - OPENVPN_CONFIG for OpenVPN (base64 encoded .ovpn)"
            echo "   - WIREGUARD_CONFIG for WireGuard (base64 encoded config)"
            echo "USE_BD_PROXY=false" >> $GITHUB_ENV
          fi

      # Test connectivity to verify Bangladesh IP
      - name: Verify Bangladesh Connection
        continue-on-error: true
        run: |
          echo "🔍 Checking connection..."
          
          if [ "${{ env.USE_BD_PROXY }}" = "true" ]; then
            echo "Testing proxy: ${{ env.BD_PROXY_HTTP }}"
            curl -x "${{ env.BD_PROXY_HTTP }}" --connect-timeout 10 -s "https://api.ipify.org?format=json" || echo "⚠️  Proxy test failed"
            curl -x "${{ env.BD_PROXY_HTTP }}" --connect-timeout 10 -s "https://api.country.is/" | grep -q '"country":"BD"' && echo "✅ Confirmed Bangladesh IP" || echo "⚠️  Could not verify Bangladesh location"
          else
            echo "Testing direct connection..."
            curl -s --connect-timeout 10 "https://api.ipify.org?format=json" || echo "Could not reach IP service"
            curl -s --connect-timeout 10 "https://api.country.is/" | grep -q '"country":"BD"' && echo "✅ Using Bangladesh IP" || echo "⚠️  Not using Bangladesh IP"
          fi

      # Main task: Run IPTV merge script
      - name: Run IPTV Merge with Bangladesh IP Filter
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "🎬 Starting IPTV Merge with Bangladesh IP Filtering"
          echo "═══════════════════════════════════════════════════════════"
          echo "Proxy Enabled: ${{ env.USE_BD_PROXY }}"
          python merge.py
          echo "═══════════════════════════════════════════════════════════"

      # Verify output files were created
      - name: Verify Output Files
        run: |
          if [ -f merged.m3u ] && [ -f sources.txt ]; then
            echo "✅ Output files created successfully"
            channels=$(grep -c '^#EXTINF' merged.m3u 2>/dev/null || echo 0)
            echo "📊 Merged channels: $channels"
          else
            echo "⚠️  Output files not found"
            ls -la *.m3u* 2>/dev/null || echo "No M3U files found"
          fi

      # Check for changes
      - name: Check if files changed
        id: verify
        run: |
          if git diff --quiet merged.m3u sources.txt 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 Changes detected - will commit"
            git diff --stat merged.m3u sources.txt || true
          fi

      # Configure Git
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "IPTV Bot"

      # Commit changes
      - name: Commit and push changes
        if: steps.verify.outputs.changed == 'true'
        run: |
          git add merged.m3u sources.txt
          git commit -m "🔄 Update IPTV channels - Bangladesh IP filtered [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push || echo "⚠️  Push failed, but workflow continues"

      # Create GitHub Release
      - name: Create GitHub Release
        if: steps.verify.outputs.changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: iptv-${{ github.run_number }}
          name: IPTV Channels - Run #${{ github.run_number }}
          body: |
            ✅ IPTV channels successfully merged with Bangladesh IP filtering
            
            **📊 Workflow Information:**
            - Run ID: ${{ github.run_id }}
            - Repository: ${{ github.repository }}
            - Triggered by: ${{ github.event_name }}
            
            **📁 Generated Files:**
            - `merged.m3u` - Complete merged M3U8 playlist
            - `sources.txt` - Channel information
            
            **🎬 Usage:**
            Download `merged.m3u` and use in your IPTV player.
          draft: false
          prerelease: false

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iptv-merged-${{ github.run_id }}
          path: |
            merged.m3u
            sources.txt
          retention-days: 30

      # Cleanup VPN if used
      - name: Cleanup VPN
        if: always()
        continue-on-error: true
        run: |
          if [ -f /tmp/openvpn.log ]; then
            echo "Stopping OpenVPN..."
            sudo killall openvpn 2>/dev/null || true
            echo "✅ OpenVPN stopped"
          fi
          if sudo ip link show wg0 > /dev/null 2>&1; then
            echo "Stopping WireGuard..."
            sudo wg-quick down wg0 2>/dev/null || true
            echo "✅ WireGuard stopped"
          fi

      # Job summary
      - name: Print Summary
        if: always()
        run: |
          echo "## IPTV Merge Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Output Files:**" >> $GITHUB_STEP_SUMMARY
          if [ -f merged.m3u ]; then
            channels=$(grep -c '^#EXTINF' merged.m3u 2>/dev/null || echo 0)
            echo "- ✅ merged.m3u ($channels channels)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f sources.txt ]; then
            echo "- ✅ sources.txt" >> $GITHUB_STEP_SUMMARY
          fi

